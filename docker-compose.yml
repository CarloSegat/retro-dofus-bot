# Postgres for the auto-fighter map_data store.
#
# Bring up:   docker compose up -d db
# Tear down:  docker compose down            (data persists in the volume)
# Wipe:       docker compose down -v         (drops the volume — destroys data)
#
# The schema in db/schema.sql is applied automatically the *first* time
# the container starts against an empty data volume (postgres image
# convention: anything in /docker-entrypoint-initdb.d/ runs on init).
# After that, schema changes must be applied manually (or via a future
# migration tool) — re-running compose does NOT re-run init scripts.
#
# Bound to 127.0.0.1 only — the DB is for local containers/scripts,
# not the network.

services:
  db:
    image: postgres:16
    container_name: auto-fighter-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: auto
      POSTGRES_PASSWORD: auto
      POSTGRES_DB: auto_fighter
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - auto_fighter_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auto -d auto_fighter"]
      interval: 5s
      timeout: 3s
      retries: 10

  # XFCE desktop accessible over VNC (5901) and noVNC (6080).
  # See desktop/Dockerfile for the build recipe. The project repo is
  # bind-mounted at /workspace so the bot code is reachable from inside.
  #
  # Bring up:  docker compose up -d desktop
  # View:      http://localhost:6080/vnc.html   (password: $VNC_PASSWORD, default "secret")
  #            or VNC viewer -> localhost:5901
  desktop:
    build:
      # Repo root so the Dockerfile can COPY requirements.txt from the
      # top level (desktop/-relative symlinks were rejected by buildx).
      context: .
      dockerfile: desktop/Dockerfile
      args:
        USER_UID: "1000"
        USER_GID: "1000"
    container_name: auto-fighter-desktop
    restart: unless-stopped
    environment:
      VNC_PASSWORD: ${VNC_PASSWORD:-secret}
      VNC_GEOMETRY: ${VNC_GEOMETRY:-1280x800}
      # Reach the sibling `db` service by its compose hostname.
      # Inside this container, 127.0.0.1 is the container itself, not
      # the host's Postgres port-forward.
      MAP_DB_URL: postgresql://auto:auto@db:5432/auto_fighter
      # Pick the pixel calibration from config.json[cell_calibrations].
      # The host and the VNC desktop have different window geometries,
      # so each needs its own fitted calibration. Run
      # `python3 recalibrate_screen.py noVNC` once inside this
      # container to populate the entry; main.py picks it up via this
      # env var (overridden by --screen on the CLI).
      FIGHTER_SCREEN: noVNC
      # Tags this container's log subdirectory (logs/<instance>/) so
      # per-bot deaths/crashes are easy to grep without sifting through
      # interleaved lines from sibling containers sharing /workspace/logs.
      # Convention: one container per Dofus character, so this value is
      # also a 1:1 stand-in for the character. After changing this env,
      # `docker compose up -d --force-recreate <service>` is required --
      # docker doesn't apply env changes to an already-running container.
      FIGHTER_INSTANCE: desktop-1
      # In-game character name running in this container. Surfaced in
      # the [session] banner the bot prints at startup so retrospective
      # `grep <name> logs/<instance>/*` finds the right files. Edit this
      # if you swap accounts for this container.
      FIGHTER_CHARACTER: marx-rockfeller
    ports:
      - "127.0.0.1:5901:5901"
      - "127.0.0.1:6080:6080"
    volumes:
      - .:/workspace
      # Persist saved Dofus/Ankama credentials + in-game prefs across
      # `docker compose down` + `up`. Mount only the app-specific
      # subdirs of ~/.config -- mounting the whole ~/.config wipes the
      # XFCE/dbus/Thunar defaults that the Electron desktop needs to
      # bootstrap (xfce4-session "Unable to load a failsafe session").
      - dofus_retro_config:/home/bot/.config/Dofus Retro
      - ankama_launcher_config:/home/bot/.config/Ankama Launcher
      - ankama_config:/home/bot/.config/Ankama
      - zaap_config:/home/bot/.config/zaap
      # Inherit host wall-clock timezone. Containers already share the
      # host's monotonic clock via the kernel, so UTC time is correct
      # automatically -- this is just so log timestamps, in-game time,
      # and TLS validity windows match the host's displayed time.
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    # Firefox / GTK apps over-allocate /dev/shm at default 64 MB and crash.
    shm_size: "1gb"
    # AppImages (Dofus Retro installer, etc.) mount themselves via FUSE.
    # Needs the userspace lib (baked into the image), the kernel device
    # exposed, and SYS_ADMIN to call mount(2). Alternative: extract the
    # AppImage with `--appimage-extract` to avoid needing these.
    devices:
      - "/dev/fuse"
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined

  # Extra desktop containers for additional Dofus client / bot instances.
  # Each gets its own loopback + /etc/hosts (no proxy interference),
  # shifted VNC ports, and separate credential volumes for a distinct account.
  desktop2:
    build:
      context: .
      dockerfile: desktop/Dockerfile
      args:
        USER_UID: "1000"
        USER_GID: "1000"
    container_name: auto-fighter-desktop-2
    restart: unless-stopped
    environment:
      VNC_PASSWORD: ${VNC_PASSWORD:-secret}
      VNC_GEOMETRY: ${VNC_GEOMETRY:-1280x800}
      MAP_DB_URL: postgresql://auto:auto@db:5432/auto_fighter
      FIGHTER_SCREEN: noVNC
      FIGHTER_INSTANCE: desktop-2
      # In-game character name -- see desktop-1 for rationale. Change
      # this when assigning a different account to this container.
      FIGHTER_CHARACTER: woonzypop
    ports:
      - "127.0.0.1:5902:5901"
      - "127.0.0.1:6081:6080"
    volumes:
      - .:/workspace
      - dofus_retro_config_2:/home/bot/.config/Dofus Retro
      - ankama_launcher_config_2:/home/bot/.config/Ankama Launcher
      - ankama_config_2:/home/bot/.config/Ankama
      - zaap_config_2:/home/bot/.config/zaap
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    shm_size: "1gb"
    devices:
      - "/dev/fuse"
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined

  desktop3:
    build:
      context: .
      dockerfile: desktop/Dockerfile
      args:
        USER_UID: "1000"
        USER_GID: "1000"
    container_name: auto-fighter-desktop-3
    restart: unless-stopped
    environment:
      VNC_PASSWORD: ${VNC_PASSWORD:-secret}
      VNC_GEOMETRY: ${VNC_GEOMETRY:-1280x800}
      MAP_DB_URL: postgresql://auto:auto@db:5432/auto_fighter
      FIGHTER_SCREEN: noVNC
      FIGHTER_INSTANCE: desktop-3
      # In-game character name -- see desktop-1 for rationale. Change
      # this when assigning a different account to this container.
      FIGHTER_CHARACTER: unset
    ports:
      - "127.0.0.1:5903:5901"
      - "127.0.0.1:6082:6080"
    volumes:
      - .:/workspace
      - dofus_retro_config_3:/home/bot/.config/Dofus Retro
      - ankama_launcher_config_3:/home/bot/.config/Ankama Launcher
      - ankama_config_3:/home/bot/.config/Ankama
      - zaap_config_3:/home/bot/.config/zaap
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    shm_size: "1gb"
    devices:
      - "/dev/fuse"
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined

volumes:
  auto_fighter_pgdata:
  dofus_retro_config:
  ankama_launcher_config:
  ankama_config:
  zaap_config:
  dofus_retro_config_2:
  ankama_launcher_config_2:
  ankama_config_2:
  zaap_config_2:
  dofus_retro_config_3:
  ankama_launcher_config_3:
  ankama_config_3:
  zaap_config_3:
